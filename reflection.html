<style>
/* --- Base site styles --- */
:root {
    --bg-color: #F7E4D3;
    --text-color: #43554F;
    --card-color: #EAD6C8;
    --border-color: rgba(67, 85, 79, 0.2);
}

body {
    margin: 0;
    background-color: var(--bg-color);
    font-family: 'Prata', serif;
    color: var(--text-color);
}

/* --- Header --- */
.header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 35px 60px 30px 60px; /* increased bottom padding for more space above line */
}

.title {
    font-size: 28px;
}

.title a {
    text-decoration: none;
    color: inherit;
}

.title .mobile {
    display: none;
    font-size: 20px;
}

.nav {
    display: flex;
    gap: 25px;
    font-size: 16px;
}

.nav a {
    text-decoration: none;
    color: var(--text-color);
}

.nav a:hover {
    color: #000;
}

.nav a.italic {
    font-style: italic;
}

.line {
    height: 1px;
    background-color: var(--text-color);
    width: 100%;
    margin-bottom: 40px; /* spacing below header line */
}

/* --- Hero / Tagline --- */
.hero {
    max-width: 800px;
    margin: 0 auto 60px auto; /* more padding below hero text */
    padding: 0 20px;
    text-align: center;
    font-size: 16px; /* slightly smaller */
    font-style: italic;
    font-weight: bold;
    line-height: 1.5;
}

/* --- Services container & card --- */
.services-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    padding: 30px 20px;
    border: 1px solid var(--border-color); /* subtle border around cards */
    border-radius: 12px;
}

.card-wrapper {
    opacity: 1;
    transform: none;
}

.service-card {
    flex: 1 1 220px;
    max-width: 300px;
    padding: 50px 40px;
    text-align: center;
    cursor: pointer;
    background: var(--card-color);
    border-radius: 12px;
    transition: all 0.3s ease;
}

.service-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.service-card h3 {
    margin-bottom: 20px;
    font-size: 20px;
}

.service-card p {
    line-height: 1.6;
    font-size: 16px;
}

/* --- Hamburger menu --- */
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 22px;
    height: 16px;
    cursor: pointer;
}

.hamburger div {
    height: 2px;
    background-color: var(--text-color);
}

/* --- Mobile menu --- */
.mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #041A14;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    transform: translateY(-20px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    padding: 20px;
    box-sizing: border-box;
}

.mobile-menu.show {
    display: flex;
    opacity: 1;
    transform: translateY(0);
}

.mobile-menu a {
    color: var(--bg-color);
    text-decoration: none;
    font-size: 18px;
    margin: 16px 0;
}

.mobile-menu a.italic {
    font-style: italic;
}

.mobile-menu a:hover {
    color: #A6E3C1;
}

.close-icon {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 32px;
    color: var(--bg-color);
    cursor: pointer;
}

/* --- Responsive scaling --- */
@media (max-width: 1150px) {
    .title .desktop {
        font-size: calc(20px + (28 - 20) * ((100vw - 750px)/400));
    }

    .nav {
        gap: calc(10px + 15 * ((100vw - 750px)/400));
        font-size: calc(12px + 4 * ((100vw - 750px)/400));
    }

    .hero {
        font-size: calc(14px + (16 - 14) * ((100vw - 750px)/400));
        margin: calc(40px + (60 - 40) * ((100vw - 750px)/400)) auto 40px auto;
    }
}

/* --- Mobile adjustments --- */
@media (max-width: 750px) {
    .header {
        padding: 35px 28px 20px 28px;
        align-items: center;
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title .desktop {
        display: none;
    }

    .title .mobile {
        display: inline;
    }

    .services-container {
        flex-direction: column;
        gap: 25px;
        align-items: center;
        padding: 20px;
    }

    .service-card {
        width: 90%;
        max-width: 320px;
    }

    .mobile-menu a {
        font-size: 20px; /* better spacing for mobile menu */
    }
}
</style>
</head>
