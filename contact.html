<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Contact — Max Thackara</title>

<link
    href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
    rel="stylesheet"
>

<link
    rel="icon"
    type="image/svg"
    href="/images/favicon.svg"
>

<style>

:root {

    --bg: #FFE5C9;
    --bg-warm: #F7DDC0;
    --bg-deep: #F0D2B4;

    --text: #44554F;
    --text-soft: rgba(68, 85, 79, 0.78);

    --line: rgba(68, 85, 79, 0.22);

    --hover: #26302d;

    --shadow:
        0 18px 40px rgba(0,0,0,0.08);
}

* {
    box-sizing: border-box;
}

html,
body {

    margin: 0;
    min-height: 100%;
}

body {

    font-family: 'Prata', serif;

    color: var(--text);

    min-height: 100vh;
    min-height: 100dvh;

    display: flex;
    flex-direction: column;

    background:
        radial-gradient(
            circle at top,
            var(--bg) 0%,
            var(--bg-warm) 48%,
            var(--bg-deep) 100%
        );

    overflow-x: hidden;

    position: relative;

    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

body::before {

    content: "";

    position: fixed;
    inset: 0;

    pointer-events: none;

    opacity: 0.04;

    background-image:
        url("https://www.transparenttextures.com/patterns/paper-fibers.png");
}

main {

    flex: 1;

    display: flex;
    flex-direction: column;

    align-items: center;

    padding:
        56px
        48px
        100px;

    position: relative;
    z-index: 2;
}

.header-container {

    text-align: center;

    width: 100%;

    animation: fadeIn 1.1s ease;
}

.title {

    font-size: 2rem;

    letter-spacing: 0.3px;

    margin-bottom: 14px;
}

.title a {

    text-decoration: none;

    color: inherit;
}

.underline {

    width: 52px;

    height: 1px;

    background-color: var(--line);

    margin:
        0 auto
        34px auto;
}

.page-nav {

    display: flex;
    justify-content: center;

    gap: 30px;

    font-size: 1.08rem;

    margin-bottom: 78px;

    flex-wrap: nowrap;
}

.page-nav a {

    text-decoration: none;

    color: var(--text-soft);

    transition:
        color 0.22s ease,
        transform 0.22s ease,
        opacity 0.22s ease;
}

.page-nav a:hover {

    color: var(--hover);

    transform: translateY(-1px);
}

.page-nav a.current {

    color: var(--text);
}

.nav-break {
    display: none;
}

.contact-page {

    width: 100%;
    max-width: 980px;

    display: flex;
    flex-direction: column;
    align-items: center;
}

.contact-top {

    display: flex;
    flex-direction: column;
    align-items: center;

    text-align: center;

    margin-bottom: 72px;
}

.portrait {

    width: 100%;
    max-width: 190px;

    height: auto;

    display: block;

    border-radius: 14px;

    margin-bottom: 24px;

    box-shadow: var(--shadow);
}

.contact-email {

    margin: 0;
}

.contact-email a {

    font-size: 1.05rem;

    text-decoration: none;

    color: var(--text);

    transition:
        color 0.22s ease,
        opacity 0.22s ease;
}

.contact-email a:hover {

    color: var(--hover);
}

/* AFFILIATIONS */

.contact-affiliations {

    display: flex;
    justify-content: center;
    align-items: flex-start;

    gap: 90px;

    width: 100%;
    max-width: 700px;
}

.affiliation {

    flex: 1;

    max-width: 260px;

    margin: 0;

    text-align: center;

    line-height: 1.85;

    color: var(--text-soft);

    font-size: 0.95rem;
}

.affiliation:last-child {

    transform: translateX(12px);
}

.affiliation em {

    font-style: italic;

    color: var(--text);
}

.affiliation a {

    color: var(--text);

    text-decoration: underline;

    text-underline-offset: 3px;

    transition:
        color 0.22s ease,
        opacity 0.22s ease;
}

.affiliation a:hover {

    color: var(--hover);
}

a:focus-visible {

    outline: 1px solid var(--text);

    outline-offset: 4px;
}

@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(6px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 980px) {

    main {

        padding:
            48px
            32px
            80px;
    }

    .title {
        font-size: 1.8rem;
    }

    .page-nav {

        gap: 22px;

        font-size: 1rem;

        margin-bottom: 68px;
    }
}

@media (max-width: 750px) {

    main {

        padding:
            38px
            20px
            70px;
    }

    .title {

        font-size: 1.55rem;

        margin-bottom: 12px;
    }

    .underline {

        width: 46px;

        margin-bottom: 30px;
    }

    .page-nav {

        flex-wrap: wrap;

        justify-content: center;

        gap: 14px 22px;

        font-size: 0.98rem;

        margin-bottom: 54px;

        max-width: 340px;

        margin-left: auto;
        margin-right: auto;
    }

    .nav-break {

        display: block;

        flex-basis: 100%;

        height: 0;
    }

    .contact-top {

        margin-bottom: 54px;
    }

    .portrait {

        max-width: 180px;

        margin-bottom: 22px;
    }

    .contact-affiliations {

        flex-direction: column;

        align-items: center;

        gap: 28px;

        max-width: 340px;
    }

    .affiliation {

        font-size: 0.92rem;
    }

    .affiliation:last-child {

        transform: none;
    }
}

@media (max-height: 700px) {

    main {

        padding-top: 28px;
    }

    .page-nav {

        margin-bottom: 42px;
    }

    .contact-top {

        margin-bottom: 42px;
    }
}

</style>
</head>

<body>

<main>

    <div class="header-container">

        <div class="title">

            <a href="index.html">
                Max Thackara
            </a>

        </div>

        <div class="underline"></div>

        <div class="page-nav">

            <a href="books.html">Books</a>

            <a href="sessions.html">Sessions</a>

            <a href="readings.html">Readings</a>

            <a href="editing.html">Editing</a>

            <span class="nav-break"></span>

            <a href="workshops.html">Workshops</a>

            <a href="contact.html" class="current">Contact</a>

        </div>

    </div>

    <div class="contact-page">

        <div class="contact-top">

            <img
                src="images/portrait.png"
                alt="Portrait of Max Thackara"
                class="portrait"
            >

            <p class="contact-email">

                <a href="mailto:contact@maxthackara.uk">
                    contact@maxthackara.uk
                </a>

            </p>

        </div>

        <div class="contact-affiliations">

            <p class="affiliation">

                Editor,
                <em>The Parlour</em><br>

                <a
                    href="https://theparlour.org.uk"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    theparlour.org.uk
                </a>

            </p>

            <p class="affiliation">

                Founder &amp; Director,
                <em>Walkden House Press</em><br>

                <a
                    href="https://walkdenhousepress.co.uk"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    walkdenhousepress.co.uk
                </a>

            </p>

        </div>

    </div>

</main>

</body>
</html>
