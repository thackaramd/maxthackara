<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;
}

/* Header container with title and nav */
.header-container {
    text-align: center;
    margin-top: 70px;
}

.title {
    font-size: 26px;
    margin-bottom: 10px;
}

.title a {
    text-decoration: none;
    color: inherit;
}

.underline {
    width: 60px;
    height: 2px;
    background-color: #43554F;
    margin: 0 auto 24px auto;
    border-radius: 4px;
}

.page-nav {
    display: flex;
    justify-content: center;
    gap: 32px;
    font-size: 18px;
    margin-bottom: 90px;
    flex-wrap: nowrap;
}

.page-nav a {
    text-decoration: none;
    color: #43554F;
}

.page-nav a.italic {
    font-style: italic;
}

.page-nav a:hover {
    color: #000;
}

.page-nav a.current,
.page-nav a.highlight {
    font-weight: bold;
}

.nav-break {
    display: none;
}

/* Contact content */
.books-container {
    display: flex;
    justify-content: center;
    padding: 0 40px 80px 40px;
    position: relative;
}

.contact-content {
    display: flex;
    flex-direction: column; /* mobile default */
    align-items: center;
    gap: 20px;
    position: relative;
}

/* Left side: portrait + email */
.contact-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

/* Right side: subtitle + download button + bullet points */
.contact-right {
    display: flex;
    flex-direction: column;
    align-items: center; 
    justify-content: center; 
    gap: 30px;
}

/* Portrait image */
.portrait {
    width: 320px;
    max-width: 70%;
    height: auto;
    display: block;
    border-radius: 12px;
}

/* Email styling */
.contact-email a {
    font-style: normal;
    font-weight: bold;
    font-size: 18px;
    text-decoration: none;
    color: #43554F;
}

.contact-email a:hover {
    color: #000;
}

/* Subtitle */
.contact-subtitle {
    font-size: 22px;
    font-weight: bold;
    margin: 0;
    text-align: center;
    padding-bottom: 2px; /* reduced spacing */
}

/* Horizontal divider under subtitle */
.sub-divider {
    width: 60px;
    height: 2px;
    background-color: #43554F;
    margin: 4px auto 0 auto; /* small gap under subtitle, no extra bottom space */
    border-radius: 4px;
}

/* Download button styling */
.contact-download a {
    padding: 10px 20px;
    background-color: #0B1D3F;
    color: #F7E4D3;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    transition: background-color 0.3s ease;
    display: inline-block;
}

.contact-download a:hover {
    background-color: #1A2B5C;
}

/* Bullet points below CV button */
.contact-bullets {
    list-style-type: disc;
    padding-left: 20px;
    margin: 0;
    text-align: left;
    color: #43554F;
}

.contact-bullets li {
    margin-bottom: 4px;
    font-size: 16px;
}

.contact-certifications {
    margin-top: 10px;
    font-size: 16px;
    font-style: italic;
    text-align: center;
}

/* Mobile adjustments */
@media (max-width: 750px) {
    .header-container {
        margin-top: 45px;
    }

    .books-container {
        padding: 0 20px 60px 20px;
    }

    .page-nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px 24px;
        font-size: 16px;
        margin-bottom: 60px;
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
    }

    .nav-break {
        display: block;
        flex-basis: 100%;
        height: 0;
    }

    .title {
        margin-bottom: 10px;
    }

    .underline {
        margin-bottom: 28px;
    }

    .portrait {
        width: 60%;
    }

    .contact-left {
        gap: 24px; 
        align-items: center;
    }

    .contact-right {
        gap: 40px; /* more space between subtitle → CV → bullets */
        align-items: center;
    }

    .contact-bullets {
        text-align: center;
        padding-left: 0;
        list-style-position: inside;
    }

    .contact-certifications {
        font-size: 14px;
    }
}

/* Desktop layout */
@media (min-width: 751px) {
    .contact-content {
        flex-direction: row;        
        align-items: flex-start;
        justify-content: center;
        gap: clamp(60px, 10vw, 90px); 
    }

    .contact-left {
        margin-left: 0px; /* move slightly right to reduce empty space */
        align-items: flex-start; 
    }

    .contact-right {
        align-items: center; 
        justify-content: center; 
        text-align: center; 
        gap: 30px; 
    }

    .contact-subtitle {
        text-align: center;
        padding-bottom: 2px; /* same as mobile */
    }

    .portrait {
        width: 360px;
    }
}
</style>
</head>
<body>

<div class="header-container">
    <div class="title">
        <a href="index.html">Max Thackara</a>
    </div>
    <div class="underline"></div>

    <div class="page-nav">
        <a href="books.html">Books</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener noreferrer">The Parlour</a>
        <a href="workshops.html">Workshops</a>
        <span class="nav-break"></span>
        <a href="https://www.superprof.co.uk/primary-english-tutor-with-qualified-teacher-status-helping-children-read-write-and-succeed.html" target="_blank" rel="noopener">Tutoring</a>
        <a href="contact.html" class="current">Contact</a>
    </div>
</div>

<main class="books-container">
    <div class="contact-content">
        <!-- Left side: Portrait + Email -->
        <div class="contact-left">
            <img src="images/portrait.png" alt="Portrait of Max Thackara" class="portrait">
            <p class="contact-email">
                <a href="mailto:contact@maxthackara.uk">contact@maxthackara.uk</a>
            </p>
        </div>

        <!-- Right side: Subtitle + Download + bullets -->
        <div class="contact-right">
            <p class="contact-subtitle">CV and Certifications</p>
            <div class="sub-divider"></div>
            <p class="contact-download">
                <a href="docs/Max_Thackara_CV.pdf" download target="_blank" rel="noopener">Download My CV</a>
            </p>
            <ul class="contact-bullets">
                <li>Qualified Teacher Status (QTS)</li>
                <li>Enhanced DBS</li>
            </ul>
            <p class="contact-certifications">Certifications available upon request.</p>
        </div>
    </div>
</main>

</body>
</html>
