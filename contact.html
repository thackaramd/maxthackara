<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;
}

/* Header container with title and nav */
.header-container {
    text-align: center;
    margin-top: 70px;
}

/* Main site title */
.title {
    font-size: 26px;
    margin-bottom: 10px;
}

.title a {
    text-decoration: none;
    color: inherit;
}

/* Small underline under main title */
.underline {
    width: 60px;
    height: 2px;
    background-color: #43554F;
    margin: 0 auto 24px auto;
    border-radius: 4px;
}

/* Nav */
.page-nav {
    display: flex;
    justify-content: center;
    gap: 32px;
    font-size: 18px;
    margin-bottom: 90px;
    flex-wrap: nowrap;
}

.page-nav a {
    text-decoration: none;
    color: #43554F;
}

.page-nav a.italic {
    font-style: italic;
}

.page-nav a:hover {
    color: #000;
}

/* Highlight current page */
.page-nav a.current,
.page-nav a.highlight {
    font-weight: bold;
}

/* Hidden break by default */
.nav-break {
    display: none;
}

/* Contact content */
.books-container {
    display: flex;
    justify-content: center;
    padding: 0 40px 80px 40px;
}

.contact-content {
    display: flex;
    flex-direction: column; /* default stacked for mobile */
    align-items: center;
    gap: 20px;
}

/* Left side: portrait + email */
.contact-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

/* Right side: subtitle + download button */
.contact-right {
    display: flex;
    flex-direction: column;
    align-items: center; /* center content horizontally */
    justify-content: center; /* center vertically relative to left section */
    gap: 12px;
}

/* Portrait image */
.portrait {
    width: 320px; /* bigger on desktop */
    max-width: 70%;
    height: auto;
    display: block;
    border-radius: 12px;
}

/* Email styling */
.contact-email a {
    font-style: italic;
    text-decoration: none;
    color: #43554F;
}

.contact-email a:hover {
    color: #000;
}

/* Subtitle under email */
.contact-subtitle {
    font-size: 22px;
    font-weight: bold;
    font-style: normal;
    color: #43554F;
    margin: 0;
    text-align: center; /* centered inside its container */
}

/* Download button styling */
.contact-download a {
    padding: 10px 20px;
    background-color: #0B1D3F;
    color: #F7E4D3;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    transition: background-color 0.3s ease;
    display: inline-block;
}

.contact-download a:hover {
    background-color: #1A2B5C;
}

/* Mobile adjustments */
@media (max-width: 750px) {
    .header-container {
        margin-top: 45px;
    }

    .books-container {
        padding: 0 20px 60px 20px;
    }

    .page-nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px 24px;
        font-size: 16px;
        margin-bottom: 60px;
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
    }

    .nav-break {
        display: block;
        flex-basis: 100%;
        height: 0;
    }

    .title {
        margin-bottom: 10px;
    }

    .underline {
        margin-bottom: 28px;
    }

    .portrait {
        width: 60%;
    }
}

/* Desktop layout */
@media (min-width: 751px) {
    .contact-content {
        flex-direction: row;        /* horizontal layout */
        align-items: flex-start;    /* align top initially */
        justify-content: center;
        gap: 100px;                 /* more space between left and right */
    }

    .contact-right {
        align-items: center;       /* center content horizontally */
        justify-content: center;   /* center content vertically */
        text-align: center;        /* center subtitle & button */
    }

    .contact-subtitle {
        text-align: center;
    }

    .portrait {
        width: 360px; /* slightly bigger */
    }
}
</style>
</head>
<body>

<div class="header-container">
    <div class="title">
        <a href="index.html">Max Thackara</a>
    </div>
    <div class="underline"></div>

    <div class="page-nav">
        <a href="books.html">Books</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener noreferrer">The Parlour</a>
        <a href="workshops.html">Workshops</a>
        <span class="nav-break"></span>
        <a href="https://www.superprof.co.uk/primary-english-tutor-with-qualified-teacher-status-helping-children-read-write-and-succeed.html" target="_blank" rel="noopener">Tutoring</a>
        <a href="contact.html" class="current">Contact</a>
    </div>
</div>

<main class="books-container">
    <div class="contact-content">
        <!-- Left side: Portrait + Email -->
        <div class="contact-left">
            <img src="images/portrait.png" alt="Portrait of Max Thackara" class="portrait">
            <p class="contact-email">
                <a href="mailto:contact@maxthackara.uk">contact@maxthackara.uk</a>
            </p>
        </div>

        <!-- Right side: Subtitle + Download -->
        <div class="contact-right">
            <p class="contact-subtitle">CV and Certifications</p>
            <p class="contact-download">
                <a href="docs/Max_Thackara_CV.pdf" download target="_blank" rel="noopener">Download My CV</a>
            </p>
        </div>
    </div>
</main>

</body>
</html>
