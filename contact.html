<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #FFE5C9;
    font-family: 'Prata', serif;
    color: #43554F;
}

/* Header */
.header-container {
    text-align: center;
    margin-top: 60px;
}

.title {
    font-size: 26px;
    margin-bottom: 10px;
}

.title a {
    text-decoration: none;
    color: inherit;
}

.underline {
    width: 60px;
    height: 2px;
    background-color: #43554F;
    margin: 0 auto 24px auto;
    border-radius: 4px;
}

.page-nav {
    display: flex;
    justify-content: center;
    gap: 32px;
    font-size: 18px;
    margin-bottom: 90px;
    flex-wrap: nowrap;
}

.page-nav a {
    text-decoration: none;
    color: #43554F;
}

.page-nav a.italic {
    font-style: italic;
}

.page-nav a:hover {
    color: #000;
}

.page-nav a.current {
    font-weight: bold;
}

.nav-break {
    display: none;
}

/* Main container */
.books-container {
    display: flex;
    justify-content: center;
    padding: 0 40px 80px 40px;
}

/* New vertical layout */
.contact-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

/* Portrait */
.portrait {
    width: 300px;
    max-width: 60%;
    height: auto;
    border-radius: 12px;
}

/* Email */
.contact-email a {
    font-weight: bold;
    font-size: 18px;
    text-decoration: none;
    color: #43554F;
}

.contact-email a:hover {
    color: #000;
}

/* Subtitle */
.contact-subtitle {
    font-size: 22px;
    font-weight: bold;
    margin: 20px 0 0 0;
    text-align: center;
    line-height: 1;
}

/* Divider */
.sub-divider {
    width: 60px;
    height: 2px;
    background-color: #43554F;
    margin: 0 auto;
    border-radius: 4px;
}

/* Button */
.contact-download a {
    padding: 10px 20px;
    background-color: #0B1D3F;
    color: #F7E4D3;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    transition: background-color 0.3s ease;
    display: inline-block;
}

.contact-download a:hover {
    background-color: #1A2B5C;
}

/* Bullets */
.contact-bullets {
    list-style-position: inside;
    padding: 0;
    margin: 0;
    text-align: center;
}

.contact-bullets li {
    margin-bottom: 4px;
    font-size: 16px;
}

/* Certifications */
.contact-certifications {
    font-size: 16px;
    font-style: italic;
    text-align: center;
}

/* Mobile */
@media (max-width: 750px) {
    .header-container {
        margin-top: 45px;
    }

    .books-container {
        padding: 0 20px 60px 20px;
    }

    .page-nav {
        flex-wrap: wrap;
        gap: 16px 24px;
        font-size: 16px;
        margin-bottom: 60px;
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
    }

    .nav-break {
        display: block;
        flex-basis: 100%;
    }

    .portrait {
        width: 60%;
    }

    .contact-certifications {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="header-container">
    <div class="title">
        <a href="index.html">Max Thackara</a>
    </div>
    <div class="underline"></div>

    <div class="page-nav">
        <a href="books.html">Books</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank">The Parlour</a>
        <a href="workshops.html">Workshops</a>
        <span class="nav-break"></span>
        <a href="https://www.superprof.co.uk/primary-english-tutor-with-qualified-teacher-status-helping-children-read-write-and-succeed.html" target="_blank">Tutoring</a>
        <a href="contact.html" class="current">Contact</a>
    </div>
</div>

<main class="books-container">
    <div class="contact-stack">

        <img src="images/portrait.png" alt="Portrait of Max Thackara" class="portrait">

        <p class="contact-email">
            <a href="mailto:contact@maxthackara.uk">contact@maxthackara.uk</a>
        </p>

        <!-- CV SECTION -->
        <p class="contact-subtitle">CV and Certifications</p>
        <div class="sub-divider"></div>

        <p class="contact-download">
            <a href="docs/Max_Thackara_CV.pdf" download target="_blank">
                Download My CV
            </a>
        </p>

        <ul class="contact-bullets">
            <li>Qualified Teacher Status (QTS)</li>
            <li>Enhanced DBS</li>
        </ul>

        <p class="contact-certifications">
            Certifications available upon request.
        </p>

        <!-- PAPERS SECTION -->
        <p class="contact-subtitle">Papers</p>
        <div class="sub-divider"></div>

        <p class="contact-download">
            <a href="docs/Ontology_Max_Thackara.pdf" target="_blank">
                Ontology
            </a>
        </p>

        <p class="contact-download">
            <a href="docs/Generative_Influence_Paper_Max_Thackara.pdf" target="_blank">
                Generative Influence
            </a>
        </p>

    </div>
</main>

</body>
</html>
