<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Thackara</title>

<!-- Prata Font -->
<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;
    text-align: center;
}

/* Header container */
.header {
    padding: 60px 20px 20px 20px; /* a bit lower from top */
}

/* Title styling */
.title {
    font-size: 36px; /* slightly smaller */
    margin-bottom: 12px;
}

.title a {
    text-decoration: none;
    color: inherit;
    display: inline-block;
}

/* Short divider under title */
.divider {
    width: 120px;
    height: 2px;
    background-color: #43554F;
    margin: 0 auto;
    border-radius: 1px;
}

@media (max-width: 600px) {
    .title {
        font-size: 28px;
    }
    .divider {
        width: 80px;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="title">
        <a href="index.html">Max Thackara</a>
    </div>
    <div class="divider"></div>
</div>

</body>
</html>
