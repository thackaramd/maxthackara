<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Max Thackara</title>

<link
    href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
    rel="stylesheet"
>

<link rel="icon" type="image/svg" href="/images/favicon.svg">

<style>
:root {

    --bg: #FFE5C9;
    --bg-warm: #F7DDC0;
    --bg-deep: #F0D2B4;

    --text: #44554F;
    --text-soft: rgba(68, 85, 79, 0.78);

    --line: rgba(68, 85, 79, 0.22);

    --hover: #26302d;
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    min-height: 100%;
}

body {

    font-family: 'Prata', serif;

    color: var(--text);

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: flex-start;

    overflow-x: hidden;

    background:
        radial-gradient(
            circle at top,
            var(--bg) 0%,
            var(--bg-warm) 48%,
            var(--bg-deep) 100%
        );

    position: relative;
}

/* subtle paper grain */

body::before {

    content: "";

    position: fixed;
    inset: 0;

    pointer-events: none;

    opacity: 0.04;

    background-image:
        url("https://www.transparenttextures.com/patterns/paper-fibers.png");
}

/* CONTAINER */

.container {

    text-align: center;

    margin-top: 132px;

    position: relative;
    z-index: 2;

    animation: fadeIn 1.1s ease;
}

/* TITLE */

.title {

    font-size: 2rem;

    letter-spacing: 0.3px;

    margin-bottom: 14px;

    color: var(--text);
}

/* UNDERLINE */

.underline {

    width: 52px;

    height: 1px;

    background-color: var(--line);

    margin:
        0 auto
        56px auto;
}

/* NAVIGATION */

.nav {

    display: flex;
    flex-direction: column;

    gap: 22px;
}

.nav a {

    text-decoration: none;

    color: var(--text-soft);

    font-size: 1.22rem;

    transition:
        color 0.22s ease,
        transform 0.22s ease,
        opacity 0.22s ease;
}

.nav a:hover {

    color: var(--hover);

    transform: translateY(-1px);
}

.nav a.italic {
    font-style: italic;
}

/* ACCESSIBILITY */

a:focus-visible {

    outline: 1px solid var(--text);

    outline-offset: 4px;
}

/* SUBTLE FADE */

@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(6px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* TABLET */

@media (max-width: 900px) {

    .container {
        margin-top: 108px;
    }

    .title {
        font-size: 1.8rem;
    }

    .nav a {
        font-size: 1.12rem;
    }
}

/* MOBILE */

@media (max-width: 768px) {

    .container {
        margin-top: 84px;
    }

    .title {

        font-size: 1.55rem;

        margin-bottom: 12px;
    }

    .underline {

        width: 46px;

        margin-bottom: 44px;
    }

    .nav {

        gap: 18px;
    }

    .nav a {

        font-size: 1.02rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="title">
        Max Thackara
    </div>

    <div class="underline"></div>

    <div class="nav">

        <a href="books.html">
            Books
        </a>

        <a href="sessions.html">
            Sessions
        </a>

        <a href="workshops.html">
            Workshops
        </a>

        <a href="readings.html">
            Readings
        </a>

        <a href="contact.html">
            Contact
        </a>

    </div>

</div>

</body>
</html>
