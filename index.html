<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Thackara</title>

<!-- Prata Font -->
<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 35px 60px 20px 60px; /* desktop padding */
    transition: padding 0.3s ease;
}

.title {
    font-size: 28px;
    transition: font-size 0.3s ease;
}

/* Desktop navigation */
.nav {
    display: flex;
    gap: 25px;
    font-size: 16px;
    transition: font-size 0.3s ease, gap 0.3s ease;
}

.nav a {
    text-decoration: none;
    color: #43554F;
    transition: color 0.3s;
}

.nav a:hover {
    color: #000;
}

/* Line under header */
.line {
    height: 1px;
    background-color: #43554F;
    width: 100%;
}

/* Centered quote */
.quote-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 76px);
    padding: 0 20px;
    text-align: center;
}

.quote {
    font-size: 16px;
    font-style: italic;
    max-width: 600px;
}

/* Hamburger menu */
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 20px; /* smaller */
    height: 16px; /* enough for 3 lines */
    cursor: pointer;
}

.hamburger div {
    width: 100%;
    height: 1.5px;
    background-color: #43554F;
}

/* Mobile menu overlay */
.mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #1B1B2F;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.mobile-menu.show {
    display: flex;
    opacity: 1;
}

.mobile-menu a {
    color: #F7E4D3;
    text-decoration: none;
    font-size: 16px; /* slightly smaller */
    margin: 16px 0;
}

/* Close icon (top-right) */
.close-icon {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 28px;
    color: #F7E4D3;
    cursor: pointer;
}

/* Responsive adjustments */
@media (max-width: 700px) {
    .header {
        padding: 35px 20px 20px 20px; /* title closer to left edge */
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title {
        font-size: 20px;
    }

    .quote {
        font-size: 14px;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="title">Max Thackara</div>

    <!-- Desktop nav -->
    <div class="nav">
        <a href="#">Books</a>
        <a href="#">Mentoring</a>
        <a href="#">Support</a>
        <a href="mailto:contact@maxthackara.uk">Contact</a>
    </div>

    <!-- Hamburger -->
    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<div class="line"></div>

<div class="quote-container">
    <div class="quote">
        "Your quote here. Something short, reflective, or inspiring."
    </div>
</div>

<!-- Mobile overlay menu -->
<div class="mobile-menu" id="mobileMenu">
    <div class="close-icon" onclick="toggleMenu()">×</div>
    <a href="#">Books</a>
    <a href="#">Mentoring</a>
    <a href="#">Support</a>
    <a href="mailto:contact@maxthackara.uk">Contact</a>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById('mobileMenu');
    menu.classList.toggle('show');
}
</script>

</body>
</html>
