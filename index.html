<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Thackara</title>

    <!-- Prata Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #F7E4D3;
            font-family: 'Prata', serif;
            color: #43554F;
        }

        /* Header with title and top-right navigation */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px 10px 30px;
        }

        .title {
            font-size: 28px;
        }

        .nav {
            display: flex;
            gap: 25px;
            font-size: 14px;
        }

        .nav a {
            text-decoration: none;
            color: #43554F;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #000; /* Slight darkening on hover */
        }

        .line {
            height: 1px;
            background-color: #43554F;
            width: 100%;
        }

        /* Centered quote */
        .quote-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 62px); /* Full viewport minus header + line height */
            padding: 0 20px;
            text-align: center;
        }

        .quote {
            font-size: 16px;
            font-style: italic;
            max-width: 600px;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 22px;
            }

            .nav {
                gap: 15px;
                font-size: 13px;
            }

            .quote {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">Max Thackara</div>
        <div class="nav">
            <a href="#">Books</a>
            <a href="#">Mentoring</a>
            <a href="#">Donate</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <div class="line"></div>

    <div class="quote-container">
        <div class="quote">
            "Your quote here. Something short, reflective, or inspiring."
        </div>
    </div>

</body>
</html>
