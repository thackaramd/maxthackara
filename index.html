<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #FFE5C9;
    font-family: 'Prata', serif;
    color: #43554F;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 35px 60px 20px 60px;
    transition: padding 0.3s ease;
}

.title {
    font-size: 28px;
    transition: font-size 0.3s ease;
}

/* Desktop navigation */
.nav {
    display: flex;
    gap: 25px;
    font-size: 16px;
}

.nav a {
    text-decoration: none;
    color: #43554F;
    transition: color 0.3s;
}

.nav a:hover {
    color: #000;
}

.nav a.italic {
    font-style: italic;
}

/* Line under header */
.line {
    height: 1px;
    background-color: #43554F;
    width: 100%;
}

/* Quote */
.quote-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 76px);
    padding: 0 20px;
    text-align: center;
    margin-top: -30px;
}

.quote {
    font-size: 18px;
    font-style: italic;
    max-width: 600px;
}

/* Hamburger */
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 20px;
    height: 16px;
    cursor: pointer;
}

.hamburger div {
    width: 100%;
    height: 1.5px;
    background-color: #43554F;
}

/* Mobile menu */
.mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #1B1B2F;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.mobile-menu.show {
    display: flex;
    opacity: 1;
}

.mobile-menu a {
    color: #F7E4D3;
    text-decoration: none;
    font-size: 18px;
    margin: 16px 0;
}

.mobile-menu a.italic {
    font-style: italic;
}

/* Close icon */
.close-icon {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 32px;
    color: #F7E4D3;
    cursor: pointer;
}

/* Responsive */
@media (max-width: 850px) {
    .header {
        padding: 35px 20px 20px 20px;
        align-items: center;
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="title">Max Thackara</div>

    <!-- Desktop nav -->
    <div class="nav">
        <a href="books.html">Books</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener">The Parlour</a>
        <a href="sessions.html">Sessions</a>
        <a href="workshops.html">Workshops</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- Hamburger -->
    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<div class="line"></div>

<div class="quote-container">
    <div class="quote">
        Welcome. This site is home to my books, workshops, one-to-one sessions, and ongoing writing.<br>
        Each page gives more detail on the different areas of work.<br>
        You’re welcome to get in touch.
    </div>
</div>

<!-- Mobile menu -->
<div class="mobile-menu" id="mobileMenu">
    <div class="close-icon" onclick="toggleMenu()">×</div>

    <a href="books.html">Books</a>
    <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener">The Parlour</a>
    <a href="sessions.html">Sessions</a>
    <a href="workshops.html">Workshops</a>
    <a href="contact.html">Contact</a>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById('mobileMenu');
    menu.classList.toggle('show');
}
</script>

</body>
</html>
