<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;

    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
}

/* Container */
.container {
    text-align: center;
    margin-top: 70px; /* Desktop default */
}

/* Name */
.title {
    font-size: 26px;
    margin-bottom: 12px;
}

/* Small underline */
.underline {
    width: 60px;
    height: 2px;
    background-color: #43554F;
    margin: 0 auto 50px auto;
    border-radius: 4px;
}

/* Navigation */
.nav {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.nav a {
    text-decoration: none;
    color: #43554F;
    font-size: 20px;
}

.nav a:hover {
    color: #000;
}

.nav a.italic {
    font-style: italic;
}

/* Mobile adjustment */
@media (max-width: 768px) {
    .container {
        margin-top: 70px; /* Reduced top margin on mobile */
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="title">Max Thackara</div>
    <div class="underline"></div>

    <div class="nav">
        <a href="books.html">Books</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener">The Parlour</a>
        <a href="mailto:contact@maxthackara.uk">Contact</a>
    </div>
</div>

</body>
</html>
