<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books — Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;
}

/* Header container with title and nav */
.header-container {
    text-align: center;
    margin-top: 50px;
}

/* Main site title */
.title {
    font-size: 28px;
    margin-bottom: 16px; /* space before divider line */
}

.title a {
    text-decoration: none;
    color: inherit;
}

/* Small underline under main title */
.underline {
    width: 60px;
    height: 1px;
    background-color: #43554F;
    margin: 0 auto 22px auto; /* space after line before nav */
}

/* Horizontal nav under title */
.page-nav {
    display: flex;
    justify-content: center;
    gap: 32px;
    font-size: 18px;
    margin-bottom: 80px; /* more space to books on desktop */
}

.page-nav a {
    text-decoration: none;
    color: #43554F;
}

.page-nav a.italic {
    font-style: italic;
}

.page-nav a:hover {
    color: #000;
}

/* Highlight current page */
.page-nav a.current {
    font-weight: bold; /* bold only, no underline */
    text-decoration: none;
}

/* Books layout */
.books-container {
    display: flex;
    justify-content: center;
    padding: 0 40px 80px 40px;
}

.book-shelf {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: clamp(20px, 5vw, 60px);
    max-width: 1000px;
    width: 100%;
}

.book {
    flex: 1 1 clamp(120px, 15%, 140px); /* smaller max size for desktop */
    display: block;
    min-height: 180px;
}

.book img {
    width: 100%;
    display: block;
    border-radius: 4px;
    height: auto;
    object-fit: contain;
    transition: transform 0.3s ease;
}

.book:hover img {
    transform: translateY(-10px);
}

/* Mobile adjustments */
@media (max-width: 750px) {
    .books-container {
        padding: 0 20px 60px 20px;
    }

    .book-shelf {
        flex-direction: column;
        align-items: center;
        gap: 40px;
    }

    .book {
        width: 50%;
        max-width: 180px;
    }

    /* Keep nav horizontal on mobile */
    .page-nav {
        flex-direction: row;
        gap: 24px;
        font-size: 16px;
        margin-bottom: 60px; /* mobile spacing */
    }

    .title {
        margin-bottom: 16px;
    }

    .underline {
        margin-bottom: 25px;
    }
}
</style>
</head>
<body>

<div class="header-container">
    <div class="title">
        <a href="index.html">Max Thackara</a>
    </div>
    <div class="underline"></div>

    <!-- Horizontal nav -->
    <div class="page-nav">
        <a href="books.html" class="current">Books</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener noreferrer">The Parlour</a>
        <a href="mailto:contact@maxthackara.uk">Contact</a>
    </div>
</div>

<main class="books-container">
    <div class="book-shelf">
        <a href="https://www.amazon.co.uk/Artists-Journey-Max-Thackara/dp/B0FFMBZX8D" class="book" target="_blank" rel="noopener">
            <img src="images/book1.png" alt="The Artist's Journey by Max Thackara" loading="lazy">
        </a>
        <a href="https://www.amazon.co.uk/First-Cup-Poetry-Collection/dp/B0F92FGWMF" class="book" target="_blank" rel="noopener">
            <img src="images/book2.png" alt="First Cup: Poetry Collection by Max Thackara" loading="lazy">
        </a>
        <a href="https://www.amazon.co.uk/Sketches-Early-Womanhood-Max-Thackara/dp/B0FNCQ8SB2" class="book" target="_blank" rel="noopener">
            <img src="images/book3.png" alt="Sketches of Early Womanhood by Max Thackara" loading="lazy">
        </a>
        <a href="https://www.amazon.co.uk/Journal-Max-Thackara/dp/B0GD4SKBBG" class="book" target="_blank" rel="noopener">
            <img src="images/book4.png" alt="Journal by Max Thackara" loading="lazy">
        </a>
    </div>
</main>

</body>
</html>
