<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books — Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;
}

/* Container for title and back button */
.header-container {
    text-align: center;
    margin-top: 80px;
    position: relative;
}

/* Back button */
.back-link {
    position: absolute;
    left: 20px;
    top: 0;
    font-size: 18px;
    text-decoration: none;
    color: #43554F;
}

.back-link:hover {
    color: #000;
}

/* Site title */
.title {
    font-size: 28px;
    margin-bottom: 10px;
}

/* Small underline under title */
.underline {
    width: 60px;
    height: 1px;
    background-color: #43554F;
    margin: 0 auto 50px auto; /* space to books */
}

/* Books layout */
.books-container {
    display: flex;
    justify-content: center;
    padding: 0 40px 80px 40px;
}

.book-shelf {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: clamp(20px, 5vw, 60px);
    max-width: 1000px;
    width: 100%;
}

.book {
    flex: 1 1 clamp(120px, 20%, 180px);
    display: block;
    min-height: 180px;
}

.book img {
    width: 100%;
    display: block;
    border-radius: 4px;
    height: auto;
    object-fit: contain;
    transition: transform 0.3s ease;
}

.book:hover img {
    transform: translateY(-10px);
}

/* Mobile adjustments */
@media (max-width: 750px) {
    .books-container {
        padding: 0 20px 60px 20px;
    }

    .book-shelf {
        flex-direction: column;
        align-items: center;
        gap: 40px;
    }

    .book {
        width: 60%;
        max-width: 220px;
    }

    .back-link {
        left: 16px;
        top: -10px;
    }
}
</style>
</head>
<body>

<div class="header-container">
    <a href="index.html" class="back-link">&lt; Back</a>
    <div class="title">Max Thackara</div>
    <div class="underline"></div>
</div>

<main class="books-container">
    <div class="book-shelf">
        <a href="https://www.amazon.co.uk/Artists-Journey-Max-Thackara/dp/B0FFMBZX8D" class="book" target="_blank" rel="noopener">
            <img src="images/book1.png" alt="The Artist's Journey by Max Thackara" loading="lazy">
        </a>
        <a href="https://www.amazon.co.uk/First-Cup-Poetry-Collection/dp/B0F92FGWMF" class="book" target="_blank" rel="noopener">
            <img src="images/book2.png" alt="First Cup: Poetry Collection by Max Thackara" loading="lazy">
        </a>
        <a href="https://www.amazon.co.uk/Sketches-Early-Womanhood-Max-Thackara/dp/B0FNCQ8SB2" class="book" target="_blank" rel="noopener">
            <img src="images/book3.png" alt="Sketches of Early Womanhood by Max Thackara" loading="lazy">
        </a>
        <a href="https://www.amazon.co.uk/Journal-Max-Thackara/dp/B0GD4SKBBG" class="book" target="_blank" rel="noopener">
            <img src="images/book4.png" alt="Journal by Max Thackara" loading="lazy">
        </a>
    </div>
</main>

</body>
</html>
