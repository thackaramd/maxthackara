<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books — Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 35px 60px 20px 60px;
}

/* Title */
.title {
    font-size: 28px;
    transition: font-size 0.2s ease;
}

.title a {
    text-decoration: none;
    color: inherit;
}

.title .mobile {
    display: none;
    font-size: 20px;
}

/* Navigation */
.nav {
    display: flex;
    gap: 25px;
    font-size: 16px;
    transition: gap 0.2s ease, font-size 0.2s ease;
}

.nav a {
    text-decoration: none;
    color: #43554F;
}

.nav a:hover {
    color: #000;
}

.nav a.italic {
    font-style: italic;
}

/* Line */
.line {
    height: 1px;
    background-color: #43554F;
    width: 100%;
}

/* BOOK SHELF */
.books-container {
    padding: 140px 40px 80px 40px;
    display: flex;
    justify-content: center;
}

.book-shelf {
    display: flex;
    gap: 60px;
    max-width: 1000px;
    width: 100%;
    justify-content: center;
}

.book {
    width: 180px;
    transition: transform 0.4s ease; /* smooth vertical lift */
    opacity: 0;
    transform: translateY(20px);
    animation: bookFadeIn 1s forwards;
}

.book img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px; /* optional: slightly rounded for elegance */
}

.book:hover {
    transform: translateY(-10px); /* gentle vertical lift on hover */
}

@keyframes bookFadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Hamburger */
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 22px;
    height: 16px;
    cursor: pointer;
}

.hamburger div {
    height: 2px;
    background-color: #43554F;
}

/* Mobile menu */
.mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #041A14;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.mobile-menu.show {
    display: flex;
    opacity: 1;
}

.mobile-menu a {
    color: #F7E4D3;
    text-decoration: none;
    font-size: 16px;
    margin: 16px 0;
}

.mobile-menu a.italic {
    font-style: italic;
}

.mobile-menu a:hover {
    color: #A6E3C1;
}

.close-icon {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 32px;
    color: #F7E4D3;
    cursor: pointer;
}

/* Responsive scaling */
@media (max-width: 1150px) {
    .title .desktop {
        font-size: calc(20px + (28 - 20) * ((100vw - 750px) / 400));
    }
    .nav {
        gap: calc(10px + 15 * ((100vw - 750px) / 400));
        font-size: calc(12px + 4 * ((100vw - 750px) / 400));
    }
}

/* Mobile */
@media (max-width: 750px) {
    .header {
        padding: 35px 28px 20px 28px;
        align-items: center;
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title .desktop {
        display: none;
    }

    .title .mobile {
        display: inline;
    }

    .book-shelf {
        flex-direction: column;
        align-items: center;
        gap: 40px;
    }

    .book {
        width: 60%;
        max-width: 220px;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="title">
        <a href="index.html">
            <span class="desktop">Max Thackara</span>
            <span class="mobile">MT</span>
        </a>
    </div>

    <div class="nav">
        <a href="books.html">Books</a>
        <a href="reflection.html">Reflection</a>
        <a href="workshops.html">Workshops</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener">The Parlour</a>
        <a href="https://www.paypal.com/donate/?business=RHZ4KP9JT4TGA&no_recurring=0&item_name=If+you+enjoy+The+Parlour+Magazine%2C+my+writing%2C+workshops%2C+or+talks%2C+your+support+helps+sustain+and+grow+this+work.+&currency_code=GBP" target="_blank" rel="noopener">Support</a>
        <a href="mailto:contact@maxthackara.uk">Contact</a>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<div class="line"></div>

<div class="books-container">
    <div class="book-shelf">

        <a href="https://www.amazon.co.uk/Artists-Journey-Max-Thackara/dp/B0FFMBZX8D" class="book" target="_blank" rel="noopener">
            <img src="images/book1.png" alt="Book 1">
        </a>

        <a href="https://www.amazon.co.uk/First-Cup-Poetry-Collection/dp/B0F92FGWMF" class="book" target="_blank" rel="noopener">
            <img src="images/book2.png" alt="Book 2">
        </a>

        <a href="https://www.amazon.co.uk/Sketches-Early-Womanhood-Max-Thackara/dp/B0FNCQ8SB2" class="book" target="_blank" rel="noopener">
            <img src="images/book3.png" alt="Book 3">
        </a>

        <a href="https://www.amazon.co.uk/Journal-Max-Thackara/dp/B0GD4SKBBG" class="book" target="_blank" rel="noopener">
            <img src="images/book4.png" alt="Book 4">
        </a>

    </div>
</div>

<div class="mobile-menu" id="mobileMenu">
    <div class="close-icon" onclick="toggleMenu()">×</div>
    <a href="books.html">Books</a>
    <a href="#">Reflection</a>
    <a href="workshops.html">Workshops</a>
    <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener">The Parlour</a>
    <a href="https://www.paypal.com/donate/?business=RHZ4KP9JT4TGA&no_recurring=0&item_name=If+you+enjoy+The+Parlour+Magazine%2C+my+writing%2C+workshops%2C+or+talks%2C+your+support+helps+sustain+and+grow+this+work.+&currency_code=GBP" target="_blank" rel="noopener">Support</a>
    <a href="mailto:contact@maxthackara.uk">Contact</a>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById('mobileMenu');
    menu.classList.toggle('show');

    if (menu.classList.contains('show')) {
        document.body.style.overflow = 'hidden';
    } else {
        document.body.style.overflow = 'auto';
    }
}

// Staggered fade-in for books
document.addEventListener('DOMContentLoaded', () => {
    const books = document.querySelectorAll('.book');
    books.forEach((book, index) => {
        book.style.animationDelay = `${index * 0.3}s`;
    });
});
</script>

</body>
</html>
