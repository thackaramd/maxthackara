<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books — Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background-color: #FFE5C9;
  font-family: 'Prata', serif;
  color: #43554F;
}

/* Header container with title and nav */
.header-container {
  text-align: center;
  margin-top: 60px;
}

/* Main site title */
.title {
  font-size: 26px;
  margin-bottom: 10px;
}

.title a {
  text-decoration: none;
  color: inherit;
}

/* Small underline under main title */
.underline {
  width: 60px;
  height: 2px;
  background-color: #43554F;
  margin: 0 auto 24px auto;
  border-radius: 4px;
}

/* Nav */
.page-nav {
  display: flex;
  justify-content: center;
  gap: 32px;
  font-size: 18px;
  margin-bottom: 90px;
  flex-wrap: nowrap; /* desktop stays in one row */
}

.page-nav a {
  text-decoration: none;
  color: #43554F;
}

.page-nav a.italic {
  font-style: italic;
}

.page-nav a:hover {
  color: #000;
}

/* Highlight current page */
.page-nav a.current {
  font-weight: bold;
}

/* Hidden break by default */
.nav-break {
  display: none;
}

/* Books layout */
.books-container {
  display: flex;
  justify-content: center;
  padding: 0 40px 80px 40px;
}

.book-shelf {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: clamp(20px, 5vw, 60px);
  max-width: 1000px;
  width: 100%;
}

.book {
  flex: 1 1 clamp(120px, 15%, 140px);
  display: block;
  min-height: 180px;
}

.book img {
  width: 100%;
  display: block;
  border-radius: 4px;
  height: auto;
  object-fit: contain;
  transition: transform 0.3s ease, box-shadow 0.25s ease;
  /* Added shadow effect */
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.book:hover img {
  transform: translateY(-10px);
}

/* Mobile adjustments */
@media (max-width: 750px) {
  .header-container {
    margin-top: 45px;
  }

  .books-container {
    padding: 0 20px 60px 20px;
  }

  .book-shelf {
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .book {
    width: 60%;
    max-width: 180px;
  }

  /* Wrapped, centered nav */
  .page-nav {
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px 24px;
    font-size: 16px;
    margin-bottom: 60px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Force second row */
  .nav-break {
    display: block;
    flex-basis: 100%;
    height: 0;
  }

  .title {
    margin-bottom: 10px;
  }

  .underline {
    margin-bottom: 28px;
  }
}
</style>
</head>

<body>

<div class="header-container">
  <div class="title">
    <a href="index.html">Max Thackara</a>
  </div>

  <div class="underline"></div>

  <div class="page-nav">
    <a href="books.html" class="current">Books</a>
    <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener noreferrer">The Parlour</a>
    <a href="sessions.html">Sessions</a>
    
    <span class="nav-break"></span>

    <a href="workshops.html">Workshops</a>
    <a href="contact.html">Contact</a>
  </div>
</div>

<main class="books-container">
  <div class="book-shelf">
    <a href="https://www.amazon.co.uk/Artists-Journey-Max-Thackara/dp/B0FFMBZX8D" class="book" target="_blank" rel="noopener">
      <img src="images/book1.png" alt="The Artist's Journey by Max Thackara" loading="lazy">
    </a>

    <a href="https://www.amazon.co.uk/First-Cup-Poetry-Collection/dp/B0F92FGWMF" class="book" target="_blank" rel="noopener">
      <img src="images/book2.png" alt="First Cup: Poetry Collection by Max Thackara" loading="lazy">
    </a>

    <a href="https://www.amazon.co.uk/Sketches-Early-Womanhood-Max-Thackara/dp/B0FNCQ8SB2" class="book" target="_blank" rel="noopener">
      <img src="images/book3.png" alt="Sketches of Early Womanhood by Max Thackara" loading="lazy">
    </a>

    <a href="https://www.amazon.co.uk/Journal-Max-Thackara/dp/B0GD4SKBBG" class="book" target="_blank" rel="noopener">
      <img src="images/book4.png" alt="Journal by Max Thackara" loading="lazy">
    </a>
  </div>
</main>

</body>
</html>
