<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books — Max Thackara</title>

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 35px 60px 20px 60px;
}

.title {
    font-size: 28px;
}

.title a {
    text-decoration: none;
    color: inherit;
}

.title .mobile {
    display: none;
}

.nav {
    display: flex;
    gap: 25px;
    font-size: 16px;
}

.nav a {
    text-decoration: none;
    color: #43554F;
}

.nav a:hover {
    color: #000;
}

.nav a.italic {
    font-style: italic;
}

.line {
    height: 1px;
    background-color: #43554F;
    width: 100%;
}

/* BOOK SHELF */
.books-container {
    padding: 80px 40px;
    display: flex;
    justify-content: center;
}

.book-shelf {
    display: flex;
    gap: 40px;
    max-width: 1000px;
    width: 100%;
    justify-content: center;
}

.book {
    width: 180px;
    transition: transform 0.3s ease;
}

.book img {
    width: 100%;
    height: auto;
    display: block;
}

.book:hover {
    transform: translateY(-6px);
}

/* Hamburger */
.hamburger {
    display: none;
    flex-direction: column;
    width: 20px; 
    height: 16px;
    cursor: pointer;
}

.hamburger div {
    height: 1.5px;
    background-color: #43554F;
}

/* Mobile menu */
.mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #1B1B2F;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.mobile-menu.show {
    display: flex;
}

.mobile-menu a {
    color: #F7E4D3;
    text-decoration: none;
    margin: 16px 0;
}

.close-icon {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 32px;
    color: #F7E4D3;
    cursor: pointer;
}

/* Responsive */
@media (max-width: 850px) {
    .header {
        padding: 35px 28px 20px 28px;
        align-items: center;
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title {
        font-size: 20px;
    }

    .title .desktop {
        display: none;
    }

    .title .mobile {
        display: inline;
    }

    .book-shelf {
        flex-direction: column;
        align-items: center;
        gap: 30px;
    }

    .book {
        width: 60%;
        max-width: 220px;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="title">
        <a href="index.html">
            <span class="desktop">Max Thackara</span>
            <span class="mobile">MT</span>
        </a>
    </div>

    <div class="nav">
        <a href="books.html">Books</a>
        <a href="#">Mentoring</a>
        <a href="#" class="italic">The Parlour</a>
        <a href="#">Support</a>
        <a href="mailto:contact@maxthackara.uk">Contact</a>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
