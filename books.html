<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Books — Max Thackara</title>

<link
    href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
    rel="stylesheet"
>

<link
    rel="icon"
    type="image/svg"
    href="/images/favicon.svg"
>

<style>

:root {

    --bg: #FFE5C9;
    --bg-warm: #F7DDC0;
    --bg-deep: #F0D2B4;

    --text: #44554F;
    --text-soft: rgba(68, 85, 79, 0.78);

    --line: rgba(68, 85, 79, 0.22);

    --hover: #26302d;

    --shadow:
        0 14px 34px rgba(0,0,0,0.08);
}

* {
    box-sizing: border-box;
}

html,
body {

    margin: 0;
    min-height: 100%;
}

body {

    font-family: 'Prata', serif;

    color: var(--text);

    min-height: 100vh;
    min-height: 100dvh;

    display: flex;
    flex-direction: column;

    background:
        radial-gradient(
            circle at top,
            var(--bg) 0%,
            var(--bg-warm) 48%,
            var(--bg-deep) 100%
        );

    overflow-x: hidden;

    position: relative;

    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

/* subtle paper grain */

body::before {

    content: "";

    position: fixed;
    inset: 0;

    pointer-events: none;

    opacity: 0.04;

    background-image:
        url("https://www.transparenttextures.com/patterns/paper-fibers.png");
}

/* MAIN LAYOUT */

main {

    flex: 1;

    display: flex;
    flex-direction: column;

    align-items: center;

    padding:
        56px
        48px
        90px;

    position: relative;
    z-index: 2;
}

/* HEADER */

.header-container {

    text-align: center;

    width: 100%;

    animation: fadeIn 1.1s ease;
}

/* TITLE */

.title {

    font-size: 2rem;

    letter-spacing: 0.3px;

    margin-bottom: 14px;
}

.title a {

    text-decoration: none;

    color: inherit;
}

/* UNDERLINE */

.underline {

    width: 52px;

    height: 1px;

    background-color: var(--line);

    margin:
        0 auto
        34px auto;
}

/* NAV */

.page-nav {

    display: flex;
    justify-content: center;

    gap: 30px;

    font-size: 1.08rem;

    margin-bottom: 82px;

    flex-wrap: nowrap;
}

.page-nav a {

    text-decoration: none;

    color: var(--text-soft);

    transition:
        color 0.22s ease,
        transform 0.22s ease,
        opacity 0.22s ease;
}

.page-nav a:hover {

    color: var(--hover);

    transform: translateY(-1px);
}

.page-nav a.italic {
    font-style: italic;
}

/* CURRENT PAGE */

.page-nav a.current {

    color: var(--text);
}

/* hidden mobile line break */

.nav-break {
    display: none;
}

/* BOOKS SECTION */

.books-container {

    width: 100%;

    display: flex;
    justify-content: center;
}

/* SHELF */

.book-shelf {

    display: flex;
    justify-content: center;

    flex-wrap: wrap;

    gap: clamp(24px, 5vw, 72px);

    max-width: 1080px;
    width: 100%;
}

/* BOOK */

.book {

    flex: 1 1 clamp(130px, 16%, 155px);

    display: block;

    min-height: 180px;
}

/* BOOK IMAGE */

.book img {

    width: 100%;

    display: block;

    border-radius: 4px;

    height: auto;

    object-fit: contain;

    transition:
        transform 0.35s ease,
        box-shadow 0.3s ease,
        opacity 0.3s ease;

    box-shadow: var(--shadow);
}

/* HOVER */

.book:hover img {

    transform:
        translateY(-10px)
        scale(1.012);

    box-shadow:
        0 22px 44px rgba(0,0,0,0.12);
}

/* ACCESSIBILITY */

a:focus-visible {

    outline: 1px solid var(--text);

    outline-offset: 4px;
}

/* SUBTLE FADE */

@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(6px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* TABLET */

@media (max-width: 980px) {

    main {

        padding:
            48px
            34px
            80px;
    }

    .title {
        font-size: 1.8rem;
    }

    .page-nav {

        gap: 22px;

        font-size: 1rem;

        margin-bottom: 68px;
    }
}

/* MOBILE */

@media (max-width: 750px) {

    main {

        padding:
            38px
            20px
            70px;
    }

    .title {

        font-size: 1.55rem;

        margin-bottom: 12px;
    }

    .underline {

        width: 46px;

        margin-bottom: 30px;
    }

    .page-nav {

        flex-wrap: wrap;

        justify-content: center;

        gap: 14px 22px;

        font-size: 0.98rem;

        margin-bottom: 48px;

        max-width: 340px;

        margin-left: auto;
        margin-right: auto;
    }

    .nav-break {

        display: block;

        flex-basis: 100%;

        height: 0;
    }

    .book-shelf {

        flex-direction: column;

        align-items: center;

        gap: 40px;
    }

    .book {

        width: 62%;

        max-width: 190px;
    }
}

/* VERY SMALL PHONES */

@media (max-height: 700px) {

    main {

        padding-top: 28px;
    }

    .page-nav {

        margin-bottom: 40px;
    }
}

</style>
</head>

<body>

<main>

    <div class="header-container">

        <div class="title">

            <a href="index.html">
                Max Thackara
            </a>

        </div>

        <div class="underline"></div>

        <div class="page-nav">

            <a
                href="books.html"
                class="current"
            >
                Books
            </a>

            <a href="sessions.html">
                Sessions
            </a>

            <a href="workshops.html">
                Workshops
            </a>

            <span class="nav-break"></span>

            <a href="readings.html">
                Readings
            </a>

            <a href="contact.html">
                Contact
            </a>

        </div>

    </div>

    <section class="books-container">

        <div class="book-shelf">

            <a
                href="https://www.amazon.co.uk/Artists-Journey-Max-Thackara/dp/B0FFMBZX8D"
                class="book"
                target="_blank"
                rel="noopener"
            >
                <img
                    src="images/book1.png"
                    alt="The Artist's Journey by Max Thackara"
                    loading="lazy"
                >
            </a>

            <a
                href="https://www.amazon.co.uk/First-Cup-Poetry-Collection/dp/B0F92FGWMF"
                class="book"
                target="_blank"
                rel="noopener"
            >
                <img
                    src="images/book2.png"
                    alt="First Cup: Poetry Collection by Max Thackara"
                    loading="lazy"
                >
            </a>

            <a
                href="https://www.amazon.co.uk/Sketches-Early-Womanhood-Max-Thackara/dp/B0FNCQ8SB2"
                class="book"
                target="_blank"
                rel="noopener"
            >
                <img
                    src="images/book4.png"
                    alt="Sketches of Early Womanhood by Max Thackara"
                    loading="lazy"
                >
            </a>

            <a
                href="https://www.amazon.co.uk/Journal-Max-Thackara/dp/B0GD4SKBBG"
                class="book"
                target="_blank"
                rel="noopener"
            >
                <img
                    src="images/book3.png"
                    alt="Journal by Max Thackara"
                    loading="lazy"
                >
            </a>

        </div>

    </section>

</main>

</body>
</html>
