<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books — Max Thackara</title>
<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F7E4D3;
    font-family: 'Prata', serif;
    color: #43554F;
}

/* Lock scroll cleanly */
body.menu-open {
    overflow: hidden;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 35px 60px 20px;
}

.title { font-size: 28px; }
.title a { text-decoration: none; color: inherit; }
.title .mobile { display: none; font-size: 20px; }

.nav {
    display: flex;
    gap: 25px;
    font-size: 16px;
}

.nav a {
    text-decoration: none;
    color: #43554F;
}

.nav a.italic { font-style: italic; }

.line {
    height: 1px;
    background-color: #43554F;
}

/* Books */
.books-container {
    padding: 140px 40px 80px;
    display: flex;
    justify-content: center;
}

.book-shelf {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(20px, 5vw, 60px);
    max-width: 1000px;
}

.book {
    flex: 1 1 clamp(120px, 20%, 180px);
}

.book img {
    width: 100%;
    border-radius: 4px;
    transition: transform 0.3s ease;
}

.book:hover img {
    transform: translateY(-10px);
}

/* Hamburger */
.hamburger {
    display: none;
    width: 24px;
    height: 18px;
    position: relative;
    cursor: pointer;
}

.hamburger span {
    position: absolute;
    width: 100%;
    height: 2px;
    background: #43554F;
    left: 0;
    transition: all 0.35s ease;
}

.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { top: 8px; }
.hamburger span:nth-child(3) { top: 16px; }

/* Animate to X */
.hamburger.active span:nth-child(1) {
    transform: rotate(45deg);
    top: 8px;
}
.hamburger.active span:nth-child(2) {
    opacity: 0;
}
.hamburger.active span:nth-child(3) {
    transform: rotate(-45deg);
    top: 8px;
}

/* Overlay (key for smoothness) */
.overlay {
    position: fixed;
    inset: 0;
    background: #041A14;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    z-index: 999;
}

.overlay.show {
    opacity: 1;
    pointer-events: auto;
}

/* Menu */
.mobile-menu {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    transform: scale(1.05);
    opacity: 0;
    transition: transform 0.4s ease, opacity 0.4s ease;

    z-index: 1000;
}

.mobile-menu.show {
    transform: scale(1);
    opacity: 1;
}

.mobile-menu a {
    color: #F7E4D3;
    text-decoration: none;
    font-size: 18px;
    margin: 14px 0;

    opacity: 0;
    transform: translateY(10px);
}

/* Stagger animation */
.mobile-menu.show a {
    animation: fadeUp 0.4s ease forwards;
}

.mobile-menu.show a:nth-child(1) { animation-delay: 0.1s; }
.mobile-menu.show a:nth-child(2) { animation-delay: 0.15s; }
.mobile-menu.show a:nth-child(3) { animation-delay: 0.2s; }
.mobile-menu.show a:nth-child(4) { animation-delay: 0.25s; }

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Responsive */
@media (max-width: 750px) {
    .nav { display: none; }
    .hamburger { display: block; }

    .title .desktop { display: none; }
    .title .mobile { display: inline; }

    .books-container {
        padding: 60px 20px;
    }

    .book-shelf {
        flex-direction: column;
        align-items: center;
    }

    .book {
        width: 60%;
        max-width: 220px;
    }
}
</style>
</head>
<body>

<header class="header">
    <div class="title">
        <a href="#">
            <span class="desktop">Max Thackara</span>
            <span class="mobile">MT</span>
        </a>
    </div>

    <nav class="nav">
        <a href="#">Books</a>
        <a href="#" class="italic">The Parlour</a>
        <a href="#">Support</a>
        <a href="#">Contact</a>
    </nav>

    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
</header>

<div class="line"></div>

<main class="books-container">
    <div class="book-shelf">
        <a class="book"><img src="images/book1.png"></a>
        <a class="book"><img src="images/book2.png"></a>
        <a class="book"><img src="images/book3.png"></a>
        <a class="book"><img src="images/book4.png"></a>
    </div>
</main>

<!-- Overlay -->
<div class="overlay" id="overlay"></div>

<!-- Menu -->
<div class="mobile-menu" id="menu">
    <a href="#">Books</a>
    <a href="#" class="italic">The Parlour</a>
    <a href="#">Support</a>
    <a href="#">Contact</a>
</div>

<script>
const hamburger = document.getElementById('hamburger');
const menu = document.getElementById('menu');
const overlay = document.getElementById('overlay');

function toggleMenu() {
    const isOpen = menu.classList.toggle('show');
    overlay.classList.toggle('show', isOpen);
    hamburger.classList.toggle('active', isOpen);
    document.body.classList.toggle('menu-open', isOpen);
}

hamburger.addEventListener('click', toggleMenu);
overlay.addEventListener('click', toggleMenu);
</script>

</body>
</html>
