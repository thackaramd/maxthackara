<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Max Thackara books and publications. Explore poetry, journals, and creative works.">
<title>Books — Max Thackara</title>
<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
:root {
    --text-color: #43554F;
    --bg-color: #F7E4D3;
    --menu-bg: #041A14;
}

body {
    margin: 0;
    background-color: var(--bg-color);
    font-family: 'Prata', serif;
    color: var(--text-color);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 35px 60px 20px 60px;
}

.title {
    font-size: 28px;
}

.title a {
    text-decoration: none;
    color: inherit;
}

.title .mobile {
    display: none;
    font-size: 20px;
}

.nav {
    display: flex;
    gap: 25px;
    font-size: 16px;
}

.nav a {
    text-decoration: none;
    color: var(--text-color);
}

.nav a.italic {
    font-style: italic;
}

.line {
    height: 1px;
    background-color: var(--text-color);
    width: 100%;
}

.books-container {
    padding: 140px 40px 80px 40px;
    display: flex;
    justify-content: center;
}

.book-shelf {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: clamp(20px, 5vw, 60px);
    max-width: 1000px;
    width: 100%;
}

.book {
    flex: 1 1 clamp(120px, 20%, 180px);
    display: block;
}

.book img {
    width: 100%;
    display: block;
    border-radius: 4px;
    aspect-ratio: 2 / 3; /* Maintains book shape */
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.book img.loaded {
    opacity: 1;
}

/* --- Hamburger --- */
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 22px;
    height: 16px;
    cursor: pointer;
}

.hamburger div {
    height: 2px;
    background-color: var(--text-color);
}

/* --- Mobile menu --- */
.mobile-menu {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: var(--menu-bg);
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

.mobile-menu.show {
    opacity: 1;
    pointer-events: auto;
}

.mobile-menu a {
    color: var(--bg-color);
    text-decoration: none;
    font-size: 16px;
    margin: 16px 0;
}

.mobile-menu a.italic {
    font-style: italic;
}

.close-icon {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 32px;
    color: var(--bg-color);
    cursor: pointer;
}

/* --- Responsive scaling --- */
@media (max-width: 1150px) {
    .title .desktop {
        font-size: calc(20px + (28 - 20) * ((100vw - 750px) / 400));
    }
    .nav {
        gap: calc(10px + 15 * ((100vw - 750px) / 400));
        font-size: calc(12px + 4 * ((100vw - 750px) / 400));
    }
}

/* --- Mobile adjustments --- */
@media (max-width: 750px) {
    .header {
        padding: 35px 28px 20px 28px;
        align-items: center;
    }

    .nav {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .title .desktop {
        display: none;
    }

    .title .mobile {
        display: inline;
    }

    .book-shelf {
        flex-direction: column;
        align-items: center;
        gap: 40px;
    }

    .book {
        width: 60%;
        max-width: 220px;
    }
}
</style>
</head>
<body>

<header class="header">
    <div class="title">
        <a href="index.html">
            <span class="desktop">Max Thackara</span>
            <span class="mobile">MT</span>
        </a>
    </div>

    <nav class="nav">
        <a href="books.html">Books</a>
        <a href="reflection.html">Reflection</a>
        <a href="workshops.html">Workshops</a>
        <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener noreferrer">The Parlour</a>
        <a href="https://www.paypal.com/donate/?business=RHZ4KP9JT4TGA&no_recurring=0&item_name=If+you+enjoy+The+Parlour+Magazine%2C+my+writing%2C+workshops%2C+or+talks%2C+your+support+helps+sustain+and+grow+this+work.+&currency_code=GBP" target="_blank" rel="noopener noreferrer">Support</a>
        <a href="mailto:contact@maxthackara.uk">Contact</a>
    </nav>

    <div class="hamburger" tabindex="0" aria-label="Toggle navigation menu" role="button">
        <div></div>
        <div></div>
        <div></div>
    </div>
</header>

<div class="line"></div>

<main class="books-container">
    <div class="book-shelf">
        <a href="https://www.amazon.co.uk/Artists-Journey-Max-Thackara/dp/B0FFMBZX8D" class="book" target="_blank" rel="noopener">
            <img src="images/book1.png" alt="The Artist's Journey book cover" width="600" height="900" loading="lazy">
        </a>

        <a href="https://www.amazon.co.uk/First-Cup-Poetry-Collection/dp/B0F92FGWMF" class="book" target="_blank" rel="noopener">
            <img src="images/book2.png" alt="First Cup: Poetry Collection book cover" width="600" height="900" loading="lazy">
        </a>

        <a href="https://www.amazon.co.uk/Sketches-Early-Womanhood-Max-Thackara/dp/B0FNCQ8SB2" class="book" target="_blank" rel="noopener">
            <img src="images/book3.png" alt="Sketches of Early Womanhood book cover" width="600" height="900" loading="lazy">
        </a>

        <a href="https://www.amazon.co.uk/Journal-Max-Thackara/dp/B0GD4SKBBG" class="book" target="_blank" rel="noopener">
            <img src="images/book4.png" alt="Journal book cover" width="600" height="900" loading="lazy">
        </a>
    </div>
</main>

<div class="mobile-menu" id="mobileMenu">
    <div class="close-icon" onclick="toggleMenu()">×</div>
    <a href="books.html">Books</a>
    <a href="reflection.html">Reflection</a>
    <a href="workshops.html">Workshops</a>
    <a href="https://theparlour.org.uk" class="italic" target="_blank" rel="noopener noreferrer">The Parlour</a>
    <a href="https://www.paypal.com/donate/?business=RHZ4KP9JT4TGA&no_recurring=0&item_name=If+you+enjoy+The+Parlour+Magazine%2C+my+writing%2C+workshops%2C+or+talks%2C+your+support+helps+sustain+and+grow+this+work.+&currency_code=GBP" target="_blank" rel="noopener noreferrer">Support</a>
    <a href="mailto:contact@maxthackara.uk">Contact</a>
</div>

<script>
// Mobile menu toggle
function toggleMenu() {
    const menu = document.getElementById('mobileMenu');
    menu.classList.toggle('show');
    document.body.style.overflow = menu.classList.contains('show') ? 'hidden' : 'auto';
}

// Hamburger interactions
document.querySelector('.hamburger').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') toggleMenu();
});
document.querySelector('.hamburger').addEventListener('click', toggleMenu);

// Close menu on Escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        const menu = document.getElementById('mobileMenu');
        if (menu.classList.contains('show')) toggleMenu();
    }
});

// Fade-in images when loaded
document.querySelectorAll('.book img').forEach(img => {
    img.addEventListener('load', () => img.classList.add('loaded'));
});
</script>

</body>
</html>
